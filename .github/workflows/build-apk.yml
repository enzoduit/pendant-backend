name: Build Omi APK (Ed's Custom Backend)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build Omi Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout pendant-backend
        uses: actions/checkout@v4

      - name: Clone Omi app (depth 1)
        run: |
          git clone --depth 1 https://github.com/BasedHardware/omi.git /tmp/omi

      - name: Create app/.env
        working-directory: /tmp/omi
        run: |
          cat > app/.env << 'EOF'
          API_BASE_URL=https://pendant-backend-production.up.railway.app/
          OPENAI_API_KEY=
          GOOGLE_MAPS_API_KEY=
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          USE_WEB_AUTH=false
          USE_AUTH_CUSTOM_TOKEN=false
          STAGING_API_URL=
          POSTHOG_API_KEY=
          EOF

      - name: Copy google-services.json
        working-directory: /tmp/omi
        run: |
          mkdir -p app/android/app/src/prod
          # Use the prebuilt google-services.json from BasedHardware (already in repo)
          cp app/setup/prebuilt/google-services.json app/android/app/src/prod/google-services.json
          echo "Copied prebuilt google-services.json"
          ls -la app/android/app/src/prod/

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: stable
          cache: true


      - name: Flutter pub get
        working-directory: /tmp/omi/app
        run: flutter pub get

      - name: Build runner (code generation)
        working-directory: /tmp/omi/app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug, prod flavor)
        working-directory: /tmp/omi/app
        env:
          CI: ""
        run: flutter build apk --debug --flavor prod

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: omi-ed-debug.apk
          path: /tmp/omi/app/build/app/outputs/flutter-apk/app-prod-debug.apk
          retention-days: 30
          if-no-files-found: warn
