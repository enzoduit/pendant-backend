name: Build Omi APK (Ed's Custom Backend)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build Omi Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout pendant-backend
        uses: actions/checkout@v4

      - name: Clone Omi app (depth 1)
        run: |
          git clone --depth 1 https://github.com/BasedHardware/omi.git /tmp/omi

      - name: Create app/.env
        working-directory: /tmp/omi
        run: |
          printf 'API_BASE_URL=https://pendant-backend-production.up.railway.app/\nOPENAI_API_KEY=\nGOOGLE_MAPS_API_KEY=\nGOOGLE_CLIENT_ID=\nGOOGLE_CLIENT_SECRET=\nUSE_WEB_AUTH=false\nUSE_AUTH_CUSTOM_TOKEN=false\nSTAGING_API_URL=\nPOSTHOG_API_KEY=\n' > app/.env
          echo "=== .env contents ===" && cat app/.env

      - name: Copy prebuilt config files
        working-directory: /tmp/omi
        run: |
          # google-services.json
          mkdir -p app/android/app/src/prod
          cp app/setup/prebuilt/google-services.json app/android/app/src/prod/google-services.json
          echo "Copied google-services.json"

          # firebase_options_dev.dart and firebase_options_prod.dart
          # main.dart imports both; use the prebuilt file for both flavors
          cp app/setup/prebuilt/firebase_options.dart app/lib/firebase_options_prod.dart
          cp app/setup/prebuilt/firebase_options.dart app/lib/firebase_options_dev.dart
          echo "Copied firebase_options dart files"


      - name: Patch auth - skip login for personal use
        working-directory: /tmp/omi
        run: |
          # 1. Make isSignedIn() always return true
          sed -i 's/return _auth.currentUser != null && !_auth.currentUser!.isAnonymous;/return true;/' app/lib/providers/auth_provider.dart

          # 2. Bypass _signIn - set uid and call onSignIn directly, skip Firebase
          sed -i 's/String? token = await _getIdToken();/String? token = "ed-pendant-token"; \/\/ bypass Firebase/' app/lib/providers/auth_provider.dart
          sed -i "s/String newUid = user.uid;/String newUid = 'ed-pendant-uid';/" app/lib/providers/auth_provider.dart
          sed -i "s/user = FirebaseAuth.instance.currentUser!;/\/\/ bypassed/" app/lib/providers/auth_provider.dart

          # 3. Skip all onboarding - go straight to HomePageWrapper
          # Patch mobile_app.dart to skip aiConsentGiven, onboardingCompleted, permissionsCompleted checks
          python3 - << PYEOF
content = open("app/lib/mobile/mobile_app.dart").read()
# Replace the entire isSignedIn block to always return HomePageWrapper
old = """        if (authProvider.isSignedIn()) {
          // Returning users who haven't yet given consent under the new
          // model must see the consent screen before any AI processing
          // begins, even if the server says they completed onboarding
          // previously. OnboardingWrapper renders the consent step in
          // that case and routes them straight to home after Continue.
          if (!SharedPreferencesUtil().aiConsentGiven) {
            return const OnboardingWrapper();
          }
          if (SharedPreferencesUtil().onboardingCompleted) {
            if (!SharedPreferencesUtil().permissionsCompleted) {
              return const _PermissionsGate();
            }
            return const HomePageWrapper();
          } else {
            return const OnboardingWrapper();
          }
        } else {
          return const DeviceSelectionPage();
        }"""
new = """        if (authProvider.isSignedIn()) {
          // BYPASS: skip all onboarding for personal use
          return const HomePageWrapper();
        } else {
          return const DeviceSelectionPage();
        }"""
if old in content:
    open("app/lib/mobile/mobile_app.dart", "w").write(content.replace(old, new))
    print("mobile_app.dart patched - skip onboarding")
else:
    print("WARNING: mobile_app.dart pattern not found, trying fallback")
    print(repr(content[800:1200]))
PYEOF

          echo "All patches applied"
          grep -n "BYPASS\|return true\|ed-pendant" app/lib/providers/auth_provider.dart app/lib/mobile/mobile_app.dart | head -10

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: stable
          cache: true


      - name: Flutter pub get
        working-directory: /tmp/omi/app
        run: flutter pub get

      - name: Build runner (code generation)
        working-directory: /tmp/omi/app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug, prod flavor)
        working-directory: /tmp/omi/app
        env:
          CI: ""
        run: flutter build apk --debug --flavor prod

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: omi-ed-debug.apk
          path: /tmp/omi/app/build/app/outputs/flutter-apk/app-prod-debug.apk
          retention-days: 30
          if-no-files-found: warn
