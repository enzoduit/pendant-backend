name: Build Listen APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'listen-app-trigger'
      - '.github/workflows/build-listen-app.yml'

jobs:
  build:
    name: Build Listen Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pendant-backend
        uses: actions/checkout@v4

      - name: Clone listen-app
        run: git clone https://github.com/enzoduit/listen-app /tmp/listen-app

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        working-directory: /tmp/listen-app
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: listen-debug
          path: /tmp/listen-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
