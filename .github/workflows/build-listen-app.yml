name: Build Listen APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'listen-app-trigger'
      - '.github/workflows/build-listen-app.yml'

jobs:
  build:
    name: Build Listen Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pendant-backend
        uses: actions/checkout@v4

      - name: Clone listen-app
        run: git clone https://github.com/enzoduit/listen-app /tmp/listen-app

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: /tmp/listen-app
        run: |
          chmod +x gradlew
          # assembleDebug auto-signs with debug key AND auto-zipaligns
          ./gradlew assembleDebug
          APK=/tmp/listen-app/app/build/outputs/apk/debug/app-debug.apk
          echo "APK size: $(ls -lh $APK | awk '{print $5}')"
          # Verify alignment of the Gradle-produced APK
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name "zipalign" 2>/dev/null | sort -r | head -1)
          $ZIPALIGN -c 4 $APK && echo "APK is aligned" || echo "APK needs realignment"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: listen-debug
          path: /tmp/listen-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
