name: Build Listen APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'listen-app-trigger'
      - '.github/workflows/build-listen-app.yml'

jobs:
  build:
    name: Build Listen Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pendant-backend
        uses: actions/checkout@v4

      - name: Clone listen-app
        run: git clone https://github.com/enzoduit/listen-app /tmp/listen-app

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        working-directory: /tmp/listen-app
        run: gradle assembleDebug

      - name: Sign APK
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" 2>/dev/null | sort -r | head -1)
          echo "apksigner: $APKSIGNER"
          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out /tmp/listen-debug-signed.apk \
            /tmp/listen-app/app/build/outputs/apk/debug/app-debug.apk
          echo "Signed APK size: $(ls -lh /tmp/listen-debug-signed.apk | awk '{print $5}')"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: listen-debug
          path: /tmp/listen-debug-signed.apk
          retention-days: 14
