name: Build Listen APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'listen-app-trigger'
      - '.github/workflows/build-listen-app.yml'

jobs:
  build:
    name: Build Listen Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pendant-backend
        uses: actions/checkout@v4

      - name: Clone listen-app
        run: git clone https://github.com/enzoduit/listen-app /tmp/listen-app

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK (auto-signed by Gradle)
        working-directory: /tmp/listen-app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          echo "Built APK:"
          ls -lh app/build/outputs/apk/debug/

      - name: Zipalign APK
        run: |
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name "zipalign" 2>/dev/null | sort -r | head -1)
          echo "zipalign: $ZIPALIGN"
          $ZIPALIGN -v -p 4 \
            /tmp/listen-app/app/build/outputs/apk/debug/app-debug.apk \
            /tmp/listen-aligned.apk
          echo "Aligned APK size: $(ls -lh /tmp/listen-aligned.apk | awk '{print $5}')"

      - name: Sign with debug keystore
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" 2>/dev/null | sort -r | head -1)
          echo "apksigner: $APKSIGNER"
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out /tmp/listen-final.apk \
            /tmp/listen-aligned.apk
          echo "Final APK size: $(ls -lh /tmp/listen-final.apk | awk '{print $5}')"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: listen-debug
          path: /tmp/listen-final.apk
          retention-days: 14
